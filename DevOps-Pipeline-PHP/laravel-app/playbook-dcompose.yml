---
- name: "Run Docker-Compose using ansible playbook"
  hosts: localhost
  tasks:
  - name: stop and remove containers
    command: docker-compose down
    ignore_errors: yes

  # تأكد من تغيير اسم الصورة بحساب Docker Hub الخاص بك إذا لزم الأمر
  - name: remove image built with dockercompose
    command: docker rmi triple3a/laravel-app
    ignore_errors: yes

  - name: remove php-apache image
    command: docker rmi php:7.4-apache
    ignore_errors: yes

  - name: remove mysql image
    command: docker rmi mysql:5.7
    ignore_errors: yes

  - name: remove phpmyadmin image
    command: docker rmi phpmyadmin/phpmyadmin
    ignore_errors: yes

  - name: build docker-compose
    command: docker-compose up -d 

  # تعطيل فحص الثغرات الأمنية مؤقتاً لتخطي حظر phpunit ثم تشغيل التحديث بدون حزم التطوير وبدون قيود المنصة
  - name: Run composer update inside apache container
    command: docker exec -i laravel-app_php-apache-environment_1 bash -c "composer config policy.advisories.block false && composer update --no-dev --ignore-platform-reqs"
